<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prasadam Counter</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        :root {
            /* PRIMARY COLORS (Professional Upgrade) */
            --maroon: #5B1A18;
            --maroon-deep: #3A0F0D;
            --maroon-light: #7A2A26;

            --saffron: #E67E22;
            --saffron-glow: #F39C12;

            --gold: #BFA14A;
            --gold-bright: #D4AF37;
            --gold-pale: #F6E7B0;

            /* BACKGROUND */
            --cream: #F9F7F2;
            --cream-2: #F4EFE6;
            --warm-white: #FFFFFF;

            /* TEXT */
            --text-primary: #1C1C1C;
            --text-secondary: #4A3A2A;
            --text-muted: #8A7A6A;

            /* BORDER & SHADOW */
            --border-warm: #E0D3B8;
            --shadow-warm: rgba(0, 0, 0, 0.08);
            --shadow-gold: rgba(191, 161, 74, 0.25);
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle at 20% 20%, rgba(196, 154, 34, .06) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(123, 27, 27, .06) 0%, transparent 50%);
        }

        .plus-button,
        .minus-button {
            touch-action: manipulation;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 2.8rem);
            color: var(--maroon-deep);
            font-weight: 800;
            margin-top: 30px;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px var(--shadow-warm);
            position: relative;
            z-index: 1;
        }

        .stall-name {
            font-size: clamp(18px, 5vw, 28px);
            font-weight: 700;
            color: var(--text-secondary);
            min-height: 32px;
            padding: 0 10px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .uicount-container {
            font-size: clamp(28px, 8vw, 40px);
            color: var(--maroon);
            font-weight: 800;
            margin: 15px 0;
            padding: 12px 40px;
            background: linear-gradient(135deg, #FFF9EC, #FFF2D8);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            min-width: 140px;
            position: relative;
            z-index: 1;
        }

        .plus-button {
            border-radius: 50%;
            width: min(70vw, 350px);
            height: min(70vw, 350px);
            font-size: clamp(60px, 15vw, 100px);
            background: linear-gradient(135deg, var(--saffron) 0%, var(--maroon) 100%);
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            color: white;
            user-select: none;
            box-shadow: 0 6px 24px rgba(212, 98, 10, .4);
            transition: all 0.2s cubic-bezier(.34, 1.56, .64, 1);
            position: relative;
            z-index: 1;
        }

        .plus-button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(212, 98, 10, .3);
        }

        .plus-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(212, 98, 10, .52);
        }

        .minus-button {
            margin-top: 12px;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 32px;
            background: linear-gradient(135deg, #C0392B 0%, #7A2A26 100%);
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            user-select: none;
            box-shadow: 0 4px 16px rgba(192, 57, 43, .3);
            transition: all 0.2s cubic-bezier(.34, 1.56, .64, 1);
            position: relative;
            z-index: 1;
        }

        .minus-button:active {
            transform: scale(0.9);
            box-shadow: 0 2px 6px rgba(192, 57, 43, .2);
        }

        .minus-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, .4);
        }

        .sync-status {
            font-size: 13px;
            margin-top: 10px;
            height: 20px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .sync-status.syncing {
            color: var(--saffron);
        }

        .sync-status.synced {
            color: #22C55E;
        }

        .sync-status.error {
            color: #C0392B;
        }

        .back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            font-size: 20px;
            padding: 8px 12px;
            cursor: pointer;
            background: var(--warm-white);
            border-radius: 10px;
            border: 1.5px solid var(--border-warm);
            color: var(--text-secondary);
            z-index: 100;
            transition: all .22s;
        }

        .back-btn:hover {
            border-color: var(--saffron);
            color: var(--saffron);
            background: #FFF5EC;
        }

        #resetBanner {
            display: none;
            background: linear-gradient(135deg, #FFF5EC, #FFE8D0);
            color: var(--maroon);
            border: 1.5px solid var(--saffron);
            border-radius: 10px;
            padding: 10px 14px;
            margin: 10px;
            font-size: 13px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 768px) {
            body {
                padding: 20px;
            }

            .uicount-container {
                padding: 15px 60px;
            }

            .minus-button {
                width: 65px;
                height: 65px;
                font-size: 36px;
            }
        }

        @media (min-width: 1024px) {
            .plus-button {
                width: 300px;
                height: 300px;
                font-size: 90px;
            }

            .uicount-container {
                font-size: 42px;
            }
        }
        .spin {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid var(--border-warm);
            border-top-color: var(--saffron);
            border-radius: 50%;
            animation: sp .7s linear infinite;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <button class="back-btn" onclick="history.back()">← Back</button>
    <div class="page-title">ATD-Gachibowli</div>
    <div id="resetBanner">📅 New day detected — all counts have been reset to 0.</div>
    <div class="loading-wrap" id="loadingDiv">Loading...</div>

    <div id="counterDiv" style="display:none; flex-direction:column; align-items:center; width:100%;">
        <div class="stall-name" id="stallName"></div>
        <div class="uicount-container" id="uiCount">0</div>
        <button class="plus-button" onclick="addCount()">+</button>
        <button class="minus-button" onclick="minusCount()">−</button>
        <div class="sync-status" id="syncStatus"></div>
    </div>

    <!-- ⚠️ config.js is gitignored — contains your API credentials -->
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>

        // ─── Config ───────────────────────────────────────────────────────────────────
        const API_KEY = AIRTABLE_CONFIG.API_KEY;
        const BASE = AIRTABLE_CONFIG.BASE;
        const STALL_TBL = AIRTABLE_CONFIG.STALL_TBL;
        const HIST_TBL = AIRTABLE_CONFIG.HIST_TBL;
        const AUTH_HDR = { 'Authorization': `Bearer ${API_KEY}` };
        const JSON_HDRS = { ...AUTH_HDR, 'Content-Type': 'application/json' };

        // ─── Date helper ──────────────────────────────────────────────────────────────
        function todayStr() {
            const d = new Date();
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            return `${dd}-${mm}-${d.getFullYear()}`;
        }

        // ─── State ────────────────────────────────────────────────────────────────────
        const stallRecordId = new URLSearchParams(window.location.search).get('stall_record_id');
        let uiCount = 0;

        const loadingDiv = document.getElementById('loadingDiv');
        const counterDiv = document.getElementById('counterDiv');
        const uiCountEl = document.getElementById('uiCount');
        const stallNameEl = document.getElementById('stallName');
        const syncEl = document.getElementById('syncStatus');

        // ─── Airtable helpers ─────────────────────────────────────────────────────────
        async function atGet(table, params = {}) {
            const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            return (await fetch(url.toString(), { headers: AUTH_HDR })).json();
        }
        async function atPost(table, records) {
            return (await fetch(`https://api.airtable.com/v0/${BASE}/${table}`, {
                method: 'POST', headers: JSON_HDRS, body: JSON.stringify({ records })
            })).json();
        }
        async function atPatch(table, records) {
            return (await fetch(`https://api.airtable.com/v0/${BASE}/${table}`, {
                method: 'PATCH', headers: JSON_HDRS, body: JSON.stringify({ records })
            })).json();
        }

        // ─── Fetch ALL stalls ─────────────────────────────────────────────────────────
        async function fetchAllStalls() {
            const res = await atGet(STALL_TBL, {
                'sort[0][field]': 'Name', 'sort[0][direction]': 'asc'
            });
            if (res.error) throw res.error;
            return (res.records || []).map(r => ({
                _id: r.id,
                Name: r.fields['Name'] || '',
                Count: r.fields['Count'] || 0
            }));
        }

        // ─── Reset ALL stall counts to 0 ─────────────────────────────────────────────
        async function resetAllStalls(allStalls) {
            const updates = allStalls.map(s => ({ id: s._id, fields: { 'Count': 0 } }));
            for (let i = 0; i < updates.length; i += 10) {
                const res = await atPatch(STALL_TBL, updates.slice(i, i + 10));
                if (res.error) throw res.error;
            }
        }

        // ─── Check if today's history record exists (SERVER-SIDE date check) ─────────
        //   Returns: { _id, dataJson } if found, or null if not found.
        //   This is the KEY FIX — every device asks Airtable "did someone already
        //   handle today's reset?" instead of trusting its own localStorage.
        async function findTodayHistoryRecord(dateStr) {
            const res = await atGet(HIST_TBL, {
                filterByFormula: `{Date} = '${dateStr}'`,
                maxRecords: 1
            });
            if (res.error) throw res.error;
            const rec = (res.records || [])[0];
            if (!rec) return null;
            let dataJson = {};
            try { dataJson = JSON.parse(rec.fields['Data JSON'] || '{}'); } catch (e) { }
            return { _id: rec.id, dataJson };
        }

        // ─── Build history JSON from stall snapshot ───────────────────────────────────
        function buildHistoryJson(allStalls, dateStr) {
            const totalCount = allStalls.reduce((sum, s) => sum + s.Count, 0);
            return {
                stalls: allStalls.map(s => ({ Name: s.Name, Count: s.Count })),
                totals: { count_total: totalCount, stall_total: allStalls.length },
                name: dateStr
            };
        }

        // ─── Write / update today's history record with latest all-stall data ─────────
        async function syncHistoryRecord(today) {
            const allStalls = await fetchAllStalls();
            const histJson = buildHistoryJson(allStalls, today);
            const existing = await findTodayHistoryRecord(today);

            if (existing) {
                const res = await atPatch(HIST_TBL, [{
                    id: existing._id,
                    fields: { 'Data JSON': JSON.stringify(histJson) }
                }]);
                if (res.error) throw res.error;
            } else {
                const res = await atPost(HIST_TBL, [{
                    fields: { 'Date': today, 'Data JSON': JSON.stringify(histJson) }
                }]);
                if (res.error) throw res.error;
            }
        }

        // ─── Page load ────────────────────────────────────────────────────────────────
        async function loadStall() {
            if (!stallRecordId) {
                loadingDiv.textContent = 'No stall selected.';
                return;
            }

            const today = todayStr();

            try {
                // ── SERVER-SIDE check: has any device already handled today's reset? ──
                //
                //   OLD (broken): if (localStorage 'lastDate' !== today) → reset
                //     Problem: each device has its own localStorage, so Device B on
                //     a fresh browser would never know Device A already reset today,
                //     and could reset again — wiping Device A's new counts to 0.
                //
                //   NEW (fixed): ask Airtable's history table for today's record.
                //     If it exists → reset already done → skip → just load count.
                //     If it doesn't exist → first device of the day → do reset →
                //     immediately create today's record so all other devices skip.

                setSyncStatus('syncing', '⏳ Checking date...');
                const todayHistory = await findTodayHistoryRecord(today);

                if (!todayHistory) {
                    // ── First device to open today → handle new-day reset ─────────────
                    setSyncStatus('syncing', '⏳ New day — resetting counts...');

                    const allStalls = await fetchAllStalls();

                    // IMPORTANT: Create today's history record FIRST (acts as a soft lock).
                    // Any other device that opens while this reset is in progress will
                    // find this record and skip the reset entirely.
                    const emptySnapshot = buildHistoryJson(
                        allStalls.map(s => ({ ...s, Count: 0 })), today
                    );
                    try {
                        await atPost(HIST_TBL, [{
                            fields: {
                                'Date': today,
                                'Data JSON': JSON.stringify(emptySnapshot)
                            }
                        }]);
                    } catch (lockErr) {
                        // Another device may have created it a split-second earlier — fine.
                        console.warn('History record already created by another device:', lockErr);
                    }

                    // Now reset all stall counts in the stall table
                    await resetAllStalls(allStalls);

                    // Show the reset banner briefly
                    document.getElementById('resetBanner').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('resetBanner').style.display = 'none';
                    }, 5000);

                }
                // If todayHistory existed → another device already handled the reset.
                // Nothing to do here — just fall through and load the live count below.

                // ── Load THIS stall's LIVE count directly from the stall table ─────────
                //
                //   OLD: read count from history JSON snapshot — could be stale if
                //        another device had incremented since the last snapshot.
                //
                //   NEW: read directly from the stall table so we always get the
                //        real-time value that Airtable holds right now.

                const res = await atGet(STALL_TBL, {
                    filterByFormula: `RECORD_ID() = '${stallRecordId}'`
                });
                if (res.error) throw res.error;

                const rec = (res.records || [])[0];
                if (!rec) { loadingDiv.textContent = 'Stall not found.'; return; }

                stallNameEl.textContent = rec.fields['Name'] || 'Counter';
                uiCount = rec.fields['Count'] || 0;  // live value from Airtable
                uiCountEl.textContent = uiCount;

                loadingDiv.style.display = 'none';
                counterDiv.style.display = 'flex';
                setSyncStatus('', '');

            } catch (e) {
                console.error(e);
                loadingDiv.textContent = 'Error loading stall.';
                toastr.error('Unable to get details. Check your connection.');
            }
        }

        // ─── +/− Buttons ──────────────────────────────────────────────────────────────
        function addCount() { uiCount++; uiCountEl.textContent = uiCount; scheduleUpdate(); }
        function minusCount() { if (uiCount > 0) uiCount--; uiCountEl.textContent = uiCount; scheduleUpdate(); }

        // ─── Debounced sync (500 ms) ──────────────────────────────────────────────────
        let debounceTimer = null, lastSendTime = 0;
        function scheduleUpdate() {
            setSyncStatus('syncing', '⏳ Saving...');
            window.onbeforeunload = () => 'Changes may not be saved yet.';
            if (debounceTimer) clearTimeout(debounceTimer);
            const now = Date.now();
            if (now - lastSendTime > 500) {
                lastSendTime = now;
                doUpdate();
            } else {
                debounceTimer = setTimeout(() => { lastSendTime = Date.now(); doUpdate(); }, 500);
            }
        }

        // ─── Sync: stall table → then history snapshot ────────────────────────────────
        async function doUpdate() {
            if (!stallRecordId) return;
            const today = todayStr();
            try {
                // 1. Write this stall's new count
                const stallRes = await atPatch(STALL_TBL, [{
                    id: stallRecordId,
                    fields: { 'Count': uiCount }
                }]);
                if (stallRes.error) throw stallRes.error;

                // 2. Update the history snapshot for today with all stalls' latest data
                await syncHistoryRecord(today);

                setSyncStatus('synced', '✅ Saved');
                window.onbeforeunload = null;

            } catch (e) {
                console.error(e);
                setSyncStatus('error', '❌ Sync failed');
                toastr.error('Unable to update count. Check your internet connection.');
            }
        }

        // ─── Sync status helper ───────────────────────────────────────────────────────
        function setSyncStatus(cls, msg) {
            syncEl.className = 'sync-status ' + (cls || '');
            syncEl.textContent = msg;
            if (cls === 'synced') {
                setTimeout(() => {
                    syncEl.textContent = '';
                    syncEl.className = 'sync-status';
                }, 2500);
            }
        }

        // ─── Init ─────────────────────────────────────────────────────────────────────
        loadStall();

    </script>
</body>

</html>
