<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATD-Gachibowli – History</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: #f5f5f5;
            padding-bottom: 50px;
        }

        .page-title {
            font-size: 22px;
            color: teal;
            margin-top: 20px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .stall-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .stall-card {
            width: 88%;
            max-width: 500px;
            padding: 10px 14px;
            background-color: wheat;
            margin: 8px auto;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: box-shadow 0.15s, transform 0.12s;
        }

        .stall-card:hover {
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
            transform: translateY(-1px);
        }

        .stall-card:nth-child(7n) {
            background-color: wheat;
        }

        .stall-card:nth-child(7n+1) {
            background-color: aliceblue;
        }

        .stall-card:nth-child(7n+2) {
            background-color: cadetblue;
        }

        .stall-card:nth-child(7n+3) {
            background-color: yellowgreen;
        }

        .stall-card:nth-child(7n+4) {
            background-color: violet;
        }

        .stall-card:nth-child(7n+5) {
            background-color: tomato;
        }

        .stall-card:nth-child(7n+6) {
            background-color: thistle;
        }

        .stall-title {
            font-size: 18px;
            font-weight: bold;
            color: #111;
        }

        .stall-meta {
            color: #3f3f3f;
            font-weight: 600;
            font-size: 14px;
            margin-top: 2px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .del-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .del-btn:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .loading-text {
            font-size: 16px;
            color: #666;
            margin-top: 30px;
        }

        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 22px;
            cursor: pointer;
            background: none;
            border: none;
            color: teal;
        }

        .empty-state {
            font-size: 16px;
            color: #888;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <!-- <button class="back-btn" onclick="window.location.href='index.html'">← Back</button> -->
    <div class="page-title">ATD-Gachibowli – History</div>

    <div class="stall-container" id="historyList">
        <div class="loading-text">Loading history...</div>
    </div>

    <!-- ⚠️ config.js is gitignored — contains your API credentials -->
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
        const API_KEY = AIRTABLE_CONFIG.API_KEY;
        const BASE = AIRTABLE_CONFIG.BASE;
        const HIST_TBL = AIRTABLE_CONFIG.HIST_TBL;
        const AUTH_HDR = { 'Authorization': `Bearer ${API_KEY}` };

        let historyRecords = [];

        async function atGet(table, params = {}) {
            const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            return (await fetch(url.toString(), { headers: AUTH_HDR })).json();
        }
        async function atDelete(table, ids) {
            const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
            ids.forEach(id => url.searchParams.append('records[]', id));
            return (await fetch(url.toString(), { method: 'DELETE', headers: AUTH_HDR })).json();
        }

        async function refreshData() {
            try {
                const res = await atGet(HIST_TBL, { 'sort[0][field]': 'Created Time', 'sort[0][direction]': 'desc' });
                if (res.error) throw res.error;
                historyRecords = (res.records || []).map(r => {
                    let dj = {};
                    try { dj = JSON.parse(r.fields['Data JSON'] || '{}'); } catch (e) { }
                    return { _id: r.id, 'Name': r.fields['Name'], 'Created Time': r.fields['Created Time'] || r.createdTime, 'Data JSON': dj };
                });
                renderHistory();
            } catch (e) {
                toastr.error('Unable to fetch history.');
                document.getElementById('historyList').innerHTML = '<div class="empty-state">Failed to load history.</div>';
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            if (!historyRecords.length) {
                list.innerHTML = '<div class="empty-state">No history records found.</div>';
                return;
            }

            historyRecords.forEach(hr => {
                const totals = hr["Data JSON"]?.totals || {};

                const card = document.createElement('div');
                card.className = 'stall-card';

                card.innerHTML = `
                <div class="card-header">
                    <div class="stall-title">${esc(hr["Name"] || 'Unnamed')}</div>
                    <button class="del-btn" onclick="deleteRecord(event,'${hr._id}')">🗑️</button>
                </div>

                <div class="stall-meta">
                    Total Count: <b>${totals.count_total ?? 0}</b>
                </div>

                <div class="stall-meta">
                    Stalls: ${totals.stall_total ?? 0}
                </div>

                <div class="stall-meta">
                    ${hr["Created Time"]
                        ? new Date(hr["Created Time"]).toLocaleString('en-IN')
                        : ''}
                </div>
            `;

                // 👉 CLICK NAVIGATION
                card.addEventListener('click', () => {
                    window.location.href = `history-details.html?history_record_id=${hr._id}`;
                });

                list.appendChild(card);
            });
        }


        function esc(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        async function deleteRecord(e, id) {
            e.stopPropagation();
            if (!confirm('Delete this history record?')) return;
            try {
                const res = await atDelete(HIST_TBL, [id]);
                if (res.error) throw res.error;
                toastr.success('Deleted successfully'); refreshData();
            } catch (e) { toastr.error('Unable to delete record.'); }
        }

        refreshData();
    </script>
</body>

</html>
