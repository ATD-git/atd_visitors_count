<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATD-Gachibowli – History</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        :root {
            /* PRIMARY COLORS (Professional Upgrade) */
            --maroon: #5B1A18;
            --maroon-deep: #3A0F0D;
            --maroon-light: #7A2A26;

            --saffron: #E67E22;
            --saffron-glow: #F39C12;

            --gold: #BFA14A;
            --gold-bright: #D4AF37;
            --gold-pale: #F6E7B0;

            /* BACKGROUND */
            --cream: #F9F7F2;
            --cream-2: #F4EFE6;
            --warm-white: #FFFFFF;

            /* TEXT */
            --text-primary: #1C1C1C;
            --text-secondary: #4A3A2A;
            --text-muted: #8A7A6A;

            /* BORDER & SHADOW */
            --border-warm: #E0D3B8;
            --shadow-warm: rgba(0, 0, 0, 0.08);
            --shadow-gold: rgba(191, 161, 74, 0.25);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--text-primary);
            text-align: center;
            padding-bottom: 50px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle at 20% 20%, rgba(196, 154, 34, .06) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(123, 27, 27, .06) 0%, transparent 50%);
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 2.8rem);
            color: var(--maroon-deep);
            font-weight: 800;
            margin-top: 30px;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px var(--shadow-warm);
            position: relative;
            z-index: 1;
        }

        .stall-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .stall-card {
            width: 88%;
            max-width: 500px;
            padding: 16px 18px;
            background: var(--warm-white);
            margin: 10px auto;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            border: 1.5px solid var(--border-warm);
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 4px 12px var(--shadow-warm);
        }

        .stall-card:hover {
            border-color: var(--saffron);
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(212, 98, 10, .18);
        }

        .stall-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: .3px;
        }

        .stall-meta {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            margin-top: 2px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .del-btn {
            background: #FFF0EE;
            border: 1.5px solid #FECACA;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            color: #B91C1C;
            transition: all .2s;
        }

        .del-btn:hover {
            background: #FEE2E2;
            border-color: #F87171;
        }

        .loading-text {
            font-size: 16px;
            color: var(--text-muted);
            margin-top: 30px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            font-size: 20px;
            cursor: pointer;
            background: var(--warm-white);
            border: 1.5px solid var(--border-warm);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text-secondary);
            z-index: 100;
            transition: all .22s;
        }

        .back-btn:hover {
            border-color: var(--saffron);
            color: var(--saffron);
            background: #FFF5EC;
        }

        .empty-state {
            font-size: 16px;
            color: var(--text-muted);
            margin-top: 40px;
        }
        .spin {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid var(--border-warm);
            border-top-color: var(--saffron);
            border-radius: 50%;
            animation: sp .7s linear infinite;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- <button class="back-btn" onclick="window.location.href='index.html'">← </button> -->
    <div class="page-title">ATD-Gachibowli – History</div>

    <div class="stall-container" id="historyList">
        <div class="loading-text">Loading history...</div>
    </div>

    <!-- ⚠️ config.js is gitignored — contains your API credentials -->
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
        const API_KEY = AIRTABLE_CONFIG.API_KEY;
        const BASE = AIRTABLE_CONFIG.BASE;
        const HIST_TBL = AIRTABLE_CONFIG.HIST_TBL;
        const AUTH_HDR = { 'Authorization': `Bearer ${API_KEY}` };

        let historyRecords = [];

        async function atGet(table, params = {}) {
            const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            return (await fetch(url.toString(), { headers: AUTH_HDR })).json();
        }
        async function atDelete(table, ids) {
            const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
            ids.forEach(id => url.searchParams.append('records[]', id));
            return (await fetch(url.toString(), { method: 'DELETE', headers: AUTH_HDR })).json();
        }

        async function refreshData() {
            try {
                const res = await atGet(HIST_TBL, { 'sort[0][field]': 'Created Time', 'sort[0][direction]': 'desc' });
                if (res.error) throw res.error;
                historyRecords = (res.records || []).map(r => {
                    let dj = {};
                    try { dj = JSON.parse(r.fields['Data JSON'] || '{}'); } catch (e) { }
                    return { _id: r.id, 'Name': r.fields['Date'], 'Created Time': r.fields['Created Time'] || r.createdTime, 'Data JSON': dj };
                });
                renderHistory();
            } catch (e) {
                toastr.error('Unable to fetch history.');
                document.getElementById('historyList').innerHTML = '<div class="empty-state">Failed to load history.</div>';
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            if (!historyRecords.length) {
                list.innerHTML = '<div class="empty-state">No history records found.</div>';
                return;
            }

            historyRecords.forEach(hr => {
                const totals = hr["Data JSON"]?.totals || {};

                const card = document.createElement('div');
                card.className = 'stall-card';

                card.innerHTML = `
                <div class="card-header">
                    <div class="stall-title">${esc(hr["Name"] || 'Unnamed')}</div>
                    <button class="del-btn" onclick="deleteRecord(event,'${hr._id}')">🗑️</button>
                </div>

                <div class="stall-meta">
                    Total Count: <b>${totals.count_total ?? 0}</b>
                </div>

                <div class="stall-meta">
                    Stalls: ${totals.stall_total ?? 0}
                </div>

                <div class="stall-meta">
                    ${hr["Created Time"]
                        ? new Date(hr["Created Time"]).toLocaleString('en-IN')
                        : ''}
                </div>
            `;

                // 👉 CLICK NAVIGATION
                card.addEventListener('click', () => {
                    window.location.href = `history-details.html?history_record_id=${hr._id}`;
                });

                list.appendChild(card);
            });
        }


        function esc(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        async function deleteRecord(e, id) {
            e.stopPropagation();
            if (!confirm('Delete this history record?')) return;
            try {
                const res = await atDelete(HIST_TBL, [id]);
                if (res.error) throw res.error;
                toastr.success('Deleted successfully'); refreshData();
            } catch (e) { toastr.error('Unable to delete record.'); }
        }

        refreshData();
    </script>
</body>

</html>
