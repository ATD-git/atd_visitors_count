<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATD Gachibowli – Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        :root {
            /* PRIMARY COLORS (Professional Upgrade) */
            --maroon: #5B1A18;
            --maroon-deep: #3A0F0D;
            --maroon-light: #7A2A26;

            --saffron: #E67E22;
            --saffron-glow: #F39C12;

            --gold: #BFA14A;
            --gold-bright: #D4AF37;
            --gold-pale: #F6E7B0;

            /* BACKGROUND */
            --cream: #F9F7F2;
            --cream-2: #F4EFE6;
            --warm-white: #FFFFFF;

            /* TEXT */
            --text-primary: #1C1C1C;
            --text-secondary: #4A3A2A;
            --text-muted: #8A7A6A;

            /* BORDER & SHADOW */
            --border-warm: #E0D3B8;
            --shadow-warm: rgba(0, 0, 0, 0.08);
            --shadow-gold: rgba(191, 161, 74, 0.25);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--text-primary);
            text-align: center;
            padding-bottom: 50px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle at 20% 20%, rgba(196, 154, 34, .06) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(123, 27, 27, .06) 0%, transparent 50%);
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 2.8rem);
            color: var(--maroon-deep);
            font-weight: 800;
            margin-top: 30px;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px var(--shadow-warm);
            position: relative;
            z-index: 1;
        }

        .section {
            background: var(--warm-white);
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            max-width: 540px;
            width: 95%;
            border: 1.5px solid var(--border-warm);
            box-shadow: 0 4px 12px var(--shadow-warm);
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--maroon);
        }

        .stall-card {
            width: 88%;
            max-width: 500px;
            padding: 12px 16px;
            margin: 10px auto;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream-2);
            cursor: pointer;
            border: 1.5px solid var(--border-warm);
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        .stall-card:hover {
            border-color: var(--saffron);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 98, 10, .15);
        }

        .stall-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-secondary);
            letter-spacing: .3px;
        }

        .special-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 22px;
            margin: 6px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            letter-spacing: .4px;
            transition: all .25s cubic-bezier(.34, 1.56, .64, 1);
            position: relative;
            z-index: 1;
        }

        .special-button:not(.danger):not(.success) {
            background: var(--warm-white);
            color: var(--text-secondary);
            border: 1.5px solid var(--border-warm);
        }

        .special-button:not(.danger):not(.success):hover {
            border-color: var(--saffron);
            color: var(--saffron);
            background: #FFF5EC;
            transform: translateY(-2px);
        }

        .special-button.success {
            background: linear-gradient(135deg, var(--saffron) 0%, var(--maroon) 100%);
            color: white;
            box-shadow: 0 6px 24px rgba(212, 98, 10, .4);
            border: none;
        }

        .special-button.success:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(212, 98, 10, .52);
        }

        .special-button.danger {
            background: linear-gradient(135deg, #C0392B 0%, #7A2A26 100%);
            color: white;
            box-shadow: 0 6px 24px rgba(192, 57, 43, .4);
            border: none;
        }

        .special-button.danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(192, 57, 43, .52);
        }

        .special-button:active {
            transform: translateY(0);
        }

        .special-button:disabled {
            opacity: .55;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .special-input {
            width: 100%;
            max-width: 350px;
            padding: 11px 14px;
            border: 1.5px solid var(--border-warm);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            background: var(--cream-2);
            color: var(--text-primary);
            outline: none;
            transition: border-color .25s, box-shadow .25s, background .25s;
            z-index: 1;
            position: relative;
        }

        .special-input::placeholder {
            color: var(--text-muted);
        }

        .special-input:focus {
            border-color: var(--saffron);
            box-shadow: 0 0 0 3.5px rgba(212, 98, 10, .13);
            background: #fff;
        }

        .form-row {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            font-size: 20px;
            cursor: pointer;
            background: var(--warm-white);
            border: 1.5px solid var(--border-warm);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text-secondary);
            z-index: 100;
            transition: all .22s;
        }

        .back-btn:hover {
            border-color: var(--saffron);
            color: var(--saffron);
            background: #FFF5EC;
        }

        .no-stalls {
            color: var(--text-muted);
            font-size: 15px;
            margin: 10px 0;
        }
        .spin {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid var(--border-warm);
            border-top-color: var(--saffron);
            border-radius: 50%;
            animation: sp .7s linear infinite;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <button class="back-btn" onclick="window.location.href='index.html'">← </button>
    <div class="page-title">ATD Gachibowli <br> – Settings</div>

    <!-- Change Title -->
    <div class="section">
        <div class="section-title">Session Title</div>
        <input type="text" class="special-input" id="sessionTitle" placeholder="Prasadam Session Title"
            style="width:85%;max-width:340px;" />
        <div style="margin-top:10px;">
            <button class="special-button success" onclick="renameTitle()">Change Title</button>
        </div>
    </div>

    <!-- Counters -->
    <div class="section">
        <details open>
            <summary class="section-title" style="cursor:pointer;list-style:none;">▾ Counters</summary>
            <div id="stallList" style="margin-top:10px;"></div>
            <div class="form-row">
                <input type="text" class="special-input" style="width:140px;" id="stallName" placeholder="Stall Name" />
                <input type="number" class="special-input" style="width:90px;" id="stallCount" placeholder="Count" />
            </div>
            <div style="margin-top:10px;">
                <button class="special-button success" onclick="addStall()">💾 Save</button>
                <button class="special-button" onclick="resetEditor()">✖ Reset</button>
            </div>
        </details>
    </div>

    <!-- Volunteer Link -->
    <div class="section">
        <div class="section-title">Volunteer Link</div>
        <div style="margin-top:10px;">
            <input type="text" class="special-input" id="editorLinkInput" readonly
                style="width:90%;max-width:420px;font-size:13px;" />
        </div>
        <div style="margin-top:8px;">
            <button class="special-button success" onclick="copyEditorLink()">📋 Copy Link for Volunteers</button>
        </div>
    </div>

    <!-- ⚠️ config.js is gitignored — contains your API credentials -->
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
        const API_KEY = AIRTABLE_CONFIG.API_KEY;
        const BASE = AIRTABLE_CONFIG.BASE;
        const STALL_TBL = AIRTABLE_CONFIG.STALL_TBL;
        const META_TBL = AIRTABLE_CONFIG.META_TBL;
        const AUTH_HDR = { 'Authorization': `Bearer ${API_KEY}` };
        const JSON_HDRS = { ...AUTH_HDR, 'Content-Type': 'application/json' };

        let stalls = [], metaRecordId = null, editingId = null;

        // Volunteer link
        const editorLink = `${window.location.origin}/index.html?params=eyAiZWRpdCI6IHRydWUgfQ==`;
        document.getElementById('editorLinkInput').value = editorLink;

        async function atGet(table, params = {}) {
            const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            return (await fetch(url.toString(), { headers: AUTH_HDR })).json();
        }
        async function atPost(table, records) {
            return (await fetch(`https://api.airtable.com/v0/${BASE}/${table}`, {
                method: 'POST', headers: JSON_HDRS, body: JSON.stringify({ records })
            })).json();
        }
        async function atPatch(table, records) {
            return (await fetch(`https://api.airtable.com/v0/${BASE}/${table}`, {
                method: 'PATCH', headers: JSON_HDRS, body: JSON.stringify({ records })
            })).json();
        }
        async function atDelete(table, ids) {
            const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
            ids.forEach(id => url.searchParams.append('records[]', id));
            return (await fetch(url.toString(), { method: 'DELETE', headers: AUTH_HDR })).json();
        }

        async function refreshData() {
            try {
                const res = await atGet(STALL_TBL, { 'sort[0][field]': 'Name', 'sort[0][direction]': 'asc' });
                if (res.error) throw res.error;
                stalls = (res.records || []).map(r => ({ ...r.fields, _id: r.id }));
                renderStalls();
            } catch (e) { toastr.error('Unable to fetch stalls.'); }
            try {
                const res = await atGet(META_TBL);
                (res.records || []).forEach(r => {
                    if (r.fields['Parameter'] === 'Title') {
                        metaRecordId = r.id;
                        document.getElementById('sessionTitle').value = r.fields['Value'] || '';
                    }
                });
            } catch (e) { toastr.error('Unable to fetch metadata.'); }
        }

        function renderStalls() {
            const list = document.getElementById('stallList'); list.innerHTML = '';
            if (!stalls.length) { list.innerHTML = '<div class="no-stalls">No counters yet. Add one below.</div>'; return; }
            stalls.forEach(stall => {
                const card = document.createElement('div');
                card.className = 'stall-card';
                card.innerHTML = `
                <div class="stall-title">${esc(stall['Name'] || '')}</div>
                <div>
                    <button onclick="openEditor('${stall._id}')" style="background:none;border:none;font-size:18px;cursor:pointer;">✏️</button>
                    <button onclick="deleteStall(event,'${stall._id}')" style="background:none;border:none;font-size:18px;cursor:pointer;">🗑️</button>
                </div>`;
                list.appendChild(card);
            });
        }

        function esc(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function openEditor(id) {
            const stall = stalls.find(s => s._id === id); if (!stall) return;
            editingId = id;
            document.getElementById('stallName').value = stall['Name'] || '';
            document.getElementById('stallCount').value = stall['Count'] != null ? stall['Count'] : '';
        }
        function resetEditor() {
            editingId = null;
            document.getElementById('stallName').value = '';
            document.getElementById('stallCount').value = '';
        }

        async function addStall() {
            const name = document.getElementById('stallName').value.trim();
            const count = document.getElementById('stallCount').value;
            if (!name) { toastr.warning('Please enter a stall name.'); return; }
            const fields = { 'Name': name, 'Count': count !== '' ? Number(count) : 0 };
            try {
                if (editingId) {
                    const res = await atPatch(STALL_TBL, [{ id: editingId, fields }]);
                    if (res.error) throw res.error;
                } else {
                    const res = await atPost(STALL_TBL, [{ fields }]);
                    if (res.error) throw res.error;
                }
                resetEditor(); refreshData();
            } catch (e) { toastr.error('Unable to save stall.'); }
        }

        async function deleteStall(e, id) {
            e.stopPropagation();
            if (!confirm('Delete this counter?')) return;
            try {
                const res = await atDelete(STALL_TBL, [id]);
                if (res.error) throw res.error;
                refreshData();
            } catch (e) { toastr.error('Unable to delete stall.'); }
        }

        async function renameTitle() {
            const value = document.getElementById('sessionTitle').value.trim();
            if (!metaRecordId) { toastr.warning('Metadata not loaded yet.'); return; }
            try {
                const res = await atPatch(META_TBL, [{ id: metaRecordId, fields: { 'Value': value } }]);
                if (res.error) throw res.error;
                toastr.success('Title changed successfully');
            } catch (e) { toastr.error('Unable to update title.'); }
        }

        async function copyEditorLink() {
            try {
                await navigator.clipboard.writeText(editorLink);
                toastr.success('Link copied to clipboard!');
            } catch (e) {
                toastr.error('Failed to copy link. Please try again.');
                console.error('Copy failed:', e);
            }
        }

        refreshData();
    </script>
</body>

</html>
