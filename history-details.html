<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ATD Gachibowli – History Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        :root {
            /* PRIMARY COLORS (Professional Upgrade) */
            --maroon: #5B1A18;
            --maroon-deep: #3A0F0D;
            --maroon-light: #7A2A26;

            --saffron: #E67E22;
            --saffron-glow: #F39C12;

            --gold: #BFA14A;
            --gold-bright: #D4AF37;
            --gold-pale: #F6E7B0;

            /* BACKGROUND */
            --cream: #F9F7F2;
            --cream-2: #F4EFE6;
            --warm-white: #FFFFFF;

            /* TEXT */
            --text-primary: #1C1C1C;
            --text-secondary: #4A3A2A;
            --text-muted: #8A7A6A;

            /* BORDER & SHADOW */
            --border-warm: #E0D3B8;
            --shadow-warm: rgba(0, 0, 0, 0.08);
            --shadow-gold: rgba(191, 161, 74, 0.25);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--text-primary);
            text-align: center;
            padding-bottom: 60px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle at 20% 20%, rgba(196, 154, 34, .06) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(123, 27, 27, .06) 0%, transparent 50%);
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 18px 50px 4px;
            z-index: 1;
        }

        .back-btn {
            position: absolute;
            left: 14px;
            font-size: 20px;
            background: var(--warm-white);
            border: 1.5px solid var(--border-warm);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1;
            transition: all .22s;
            z-index: 100;
        }

        .back-btn:hover {
            border-color: var(--saffron);
            color: var(--saffron);
            background: #FFF5EC;
        }

        .page-title {
            font-size: 20px;
            color: var(--maroon-deep);
            font-weight: 800;
        }

        /* ── Session header ── */
        .session-name {
            font-size: 28px;
            font-weight: 800;
            color: var(--maroon);
            margin-top: 10px;
            padding: 0 12px;
            position: relative;
            z-index: 1;
        }

        .session-date {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }

        /* ── Cards grid ── */
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 18px;
            padding: 0 8px;
            position: relative;
            z-index: 1;
        }

        .card {
            width: 40vw;
            max-width: 150px;
            height: 40vw;
            min-height: 130px;
            max-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 8px;
            border-radius: 12px;
            background: var(--cream-2);
            border: 1.5px solid var(--border-warm);
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 4px 12px var(--shadow-warm);
        }

        .card:hover {
            border-color: var(--saffron);
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(212, 98, 10, .18);
        }

        .card.total {
            background: linear-gradient(135deg, #FFF9EC, #FFF2D8);
            border-color: var(--gold);
        }

        .card.total:hover {
            transform: none;
            box-shadow: none;
            border-color: var(--gold);
        }

        .card-label {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--maroon);
        }

        /* ── Buttons ── */
        .btn-row {
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 24px;
            margin: 6px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            letter-spacing: .4px;
            background: linear-gradient(135deg, var(--saffron) 0%, var(--maroon) 100%);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(212, 98, 10, .4);
            transition: all .25s cubic-bezier(.34, 1.56, .64, 1);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(212, 98, 10, .52);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: .55;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ── States ── */
        .loading-wrap {
            margin-top: 80px;
            font-size: 16px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 4px solid var(--border-warm);
            border-top-color: var(--saffron);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .no-data {
            color: var(--text-muted);
            font-size: 15px;
            margin-top: 16px;
            position: relative;
            z-index: 1;
        }

        .error-box {
            background: linear-gradient(135deg, #FFF5EC, #FFE8D0);
            border: 1.5px solid var(--saffron);
            border-radius: 10px;
            padding: 12px 16px;
            margin: 16px auto;
            max-width: 480px;
            font-size: 13px;
            color: var(--maroon);
            text-align: left;
            word-break: break-all;
            display: none;
            position: relative;
            z-index: 1;
        }

        #mainContent {
            display: none;
        }
        .spin {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid var(--border-warm);
            border-top-color: var(--saffron);
            border-radius: 50%;
            animation: sp .7s linear infinite;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Top bar -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='history.html'">&#8592;</button>
        <div class="page-title">ATD Gachibowli-History Details</div>
    </div>

    <!-- Loading state -->
    <div class="loading-wrap" id="loadingDiv">
        <div class="spinner"></div><br>Loading...
    </div>

    <!-- Error box -->
    <div class="error-box" id="errorBox"></div>

    <!-- Main content — hidden until data loads -->
    <div id="mainContent">

        <div class="session-name" id="sessionName"></div>
        <div class="session-date" id="sessionDate"></div>

        <!-- Totals row -->
        <div class="card-grid">
            <div class="card total">
                <div class="card-label">Counters</div>
                <div class="card-value" id="stallTotal">0</div>
            </div>
            <div class="card total">
                <div class="card-label">Total Count</div>
                <div class="card-value" id="countTotal">0</div>
            </div>
        </div>

        <!-- Per-counter cards — built from Data JSON -->
        <div class="card-grid" id="counterCards"></div>

        <!-- Action buttons -->
        <div class="btn-row">
            <button class="btn" onclick="copySummary()">&#9986;&#65039; Summary</button>
            <button class="btn" onclick="whatsappSummary()">&#128228; WhatsApp</button>
        </div>

    </div>

    <!-- config.js: contains API_KEY, BASE, HIST_TBL — never commit -->
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <script>
        // ════════════════════════════════════════════════════════════════════
        //  READS ONLY FROM HISTORY TABLE  (AIRTABLE_CONFIG.HIST_TBL)
        //  No STALL_TBL, no secret-phrase input, no redirect to index.html
        // ════════════════════════════════════════════════════════════════════

        const API_KEY = AIRTABLE_CONFIG.API_KEY;
        const BASE = AIRTABLE_CONFIG.BASE;
        const HIST_TBL = AIRTABLE_CONFIG.HIST_TBL;   // tbls5yP5nGPMFa0ad

        // Record ID passed in URL:  history_detail.html?history_record_id=recXXX
        const historyRecordId =
            new URLSearchParams(window.location.search).get('history_record_id');

        // Page-level state
        let dataJson = null;
        let recordName = '';
        let createdAt = '';

        // ── Load single record from history table ──────────────────────────
        async function loadData() {
            const loadDiv = document.getElementById('loadingDiv');

            if (!historyRecordId) {
                loadDiv.innerHTML = '&#9888;&#65039; No record ID found in URL.';
                return;
            }

            try {
                const url = `https://api.airtable.com/v0/${BASE}/${HIST_TBL}/${historyRecordId}`;
                const res = await fetch(url, {
                    headers: { Authorization: 'Bearer ' + API_KEY }
                });
                const rec = await res.json();

                if (rec.error) {
                    loadDiv.textContent = 'Airtable error: ' + (rec.error.message || rec.error);
                    showError(JSON.stringify(rec.error, null, 2));
                    return;
                }

                // ── Pull fields ────────────────────────────────────────────
                recordName = rec.fields['Name'] || '';
                createdAt = rec.fields['Created Time'] || rec.createdTime || '';

                // ── Parse Data JSON ────────────────────────────────────────
                // Stored format:
                // {
                //   "stalls"  : [{"Name":"Evening","Count":8},{"Name":"Morning","Count":33}],
                //   "totals"  : {"count_total":41,"stall_total":2},
                //   "name"    : "11-04-2026"
                // }
                const raw = rec.fields['Data JSON'] || '{}';
                try {
                    dataJson = JSON.parse(raw);
                } catch (_) {
                    loadDiv.textContent = 'Error: Could not parse Data JSON.';
                    showError('Raw value received:\n' + raw);
                    return;
                }

                // Safety fallbacks
                if (!dataJson.stalls) dataJson.stalls = [];
                if (!dataJson.totals) {
                    const total = dataJson.stalls.reduce((s, x) => s + (x.Count || 0), 0);
                    dataJson.totals = { count_total: total, stall_total: dataJson.stalls.length };
                }

                render();

            } catch (err) {
                console.error(err);
                document.getElementById('loadingDiv').textContent =
                    'Network error — check your connection.';
                toastr.error('Unable to fetch history record.');
            }
        }

        // ── Render all UI from dataJson ────────────────────────────────────
        function render() {
            document.getElementById('loadingDiv').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            // Header
            document.getElementById('sessionName').textContent =
                recordName || dataJson.name || '';
            document.getElementById('sessionDate').textContent = createdAt
                ? 'Saved at ' + new Date(createdAt).toLocaleString('en-IN')
                : '';

            // Totals
            document.getElementById('stallTotal').textContent =
                dataJson.totals.stall_total ?? 0;
            document.getElementById('countTotal').textContent =
                dataJson.totals.count_total ?? 0;

            // Per-counter cards
            const grid = document.getElementById('counterCards');
            grid.innerHTML = '';

            if (!dataJson.stalls.length) {
                grid.innerHTML = '<div class="no-data">No counter data in this record.</div>';
                return;
            }

            dataJson.stalls.forEach(stall => {
                const name = stall.Name || stall.name || '—';
                const count = stall.Count ?? stall.count ?? 0;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML =
                    '<div class="card-label">' + esc(name) + '</div>' +
                    '<div class="card-value">' + count + '</div>';
                grid.appendChild(card);
            });
        }

        // ── Helpers ────────────────────────────────────────────────────────
        function esc(t) {
            return String(t)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }

        // ── Summary ────────────────────────────────────────────────────────
        function generateSummary() {
            if (!dataJson) return '';
            const t = dataJson.totals;
            const label = recordName || dataJson.name || '';
            const when = createdAt
                ? new Date(createdAt).toLocaleString('en-IN')
                : label;

            return [
                'Hare Krishna',
                'Date of Darshan: ' + label,
                'Generated at: ' + when,
                '',
                'Counters:    ' + (t.stall_total ?? 0),
                'Total Count: ' + (t.count_total ?? 0),
                '',
                ...dataJson.stalls.map(s =>
                    (s.Name || s.name) + ' - ' + (s.Count ?? s.count ?? 0)
                )
            ].join('\n');
        }

        function copySummary() {
            navigator.clipboard.writeText(generateSummary());
            toastr.success('Summary copied!');
        }

        function whatsappSummary() {
            window.open(
                'https://api.whatsapp.com/send?text=' +
                encodeURIComponent(generateSummary())
            );
        }

        // ── Boot ───────────────────────────────────────────────────────────
        loadData();
    </script>

</body>

</html>
